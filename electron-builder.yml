appId: com.personal-finance.app
productName: Personal Finance
copyright: Copyright © 2025

directories:
  output: release
  buildResources: resources

files:
  - dist-electron/**/*
  - package.json

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
  - from: .next/static
    to: standalone/.next/static
    filter:
      - "**/*"
  - from: public
    to: standalone/public
    filter:
      - "**/*"

asar: true

mac:
  category: public.app-category.finance
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

linux:
  icon: resources
  category: Finance
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

publish: null
